run_name: ddpm-cfg-f
seed: 42
data_dir: /local/dataset/imagenet100_128x128/train
image_size: 128
batch_size: 256
num_workers: 4
num_classes: 100
num_epochs: 200
learning_rate: 0.0001
weight_decay: 0.0001
num_train_timesteps: 1000
num_inference_steps: 250
beta_start: 0.0001
beta_end: 0.02
# beta_schedule: linear
beta_schedule: cosine

use_ddim: true
latent_ddpm: true
prediction_type: v_prediction
# prediction_type: epsilon

clip_sample: false
clip_sample_range: 1.0
grad_clip: 5.0

low_t_aux_weight: 0.25
low_t_prob: 0.2
low_t_max: 200

use_cfg: true
cfg_guidance_scale: 5.0

lr_warmup_steps: 2000
min_lr_ratio: 0.01

num_gen_images: 64 # multiple of 4 must be
min_snr_gamma: 1.0

variance_type: fixed_small
image_in_size: 128
unet_in_size: 32
unet_in_ch: 3
unet_ch: 128
unet_num_res_blocks: 2
unet_ch_mult: [1, 2, 2, 4]
unet_attn: [2, 3]
unet_dropout: 0.05